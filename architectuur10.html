<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html>
<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta charset="UTF-8">
    <title>werkblad 3</title>
    <style>
        body { 
            margin: 0; 
            padding: 40px; 
            font-family: 'helvetica';
            background: #fcfcfc; 
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 60px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .artwork {
            width: 100%;
            margin: 0;
        }

        .full-width {
            grid-column: span 2;
        }

        .artwork img {
            width: 100%;
            display: block;
            border: 1px solid #ddd;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .artwork figcaption {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #666;
            text-align: center;
        }

        /* Styling voor interactieve afbeeldingen */
        #afbeelding7, #afbeelding9 {
            cursor: pointer;
            transition: transform 0.2s;
        }

        #afbeelding7:hover, #afbeelding9:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<main class="gallery">
      <figure class="artwork full-width">
        <img src="afbeelding1.jpg" alt="picture">
        <figcaption>afbeelding1 2 niet getoond</figcaption>
    </figure>

    <figure class="artwork full-width">
        <img src="afbeelding3.jpg" alt="picture">
        <figcaption>afbeelding3 4 niet getoond</figcaption>
    </figure>

    <figure class="artwork ">
        <img src="afbeelding5.jpg" alt="picture">
        <figcaption>afbeelding 5</figcaption>
    </figure>

    <figure class="artwork">
        <img src="afbeelding6.jpg" alt="picture">
        <figcaption>afbeelding6</figcaption>
    </figure>

    <figure class="artwork ">
        <img src="afbeelding6.jpg" alt="Staafjes">
        <figcaption>afbeelding7 niet 8 getoond</figcaption>
    </figure>

    <figure class="artwork ">
        <img src="afbeelding8.jpg" alt="picture">
        <figcaption>Geringe lichtsterkte</figcaption>
    </figure>
  
    <figure class="artwork">
        <img src="afbeelding9.jpg" alt="Verschiet">
        <figcaption>afbeelding 9</figcaption>
    </figure>

    <figure class="artwork">
        <!-- ID toegevoegd zodat het script de afbeelding kan vinden -->
        <img src="afbeelding10.jpg" alt="Haak animatie" id="afbeelding9">
        <figcaption>afbeelding10</figcaption>
    </figure>

  <figure class="artwork full width">
        <img src="afbeelding11.jpg" alt="picture">
        <figcaption>afbeelding11</figcaption>
    </figure>

    <figure class="artwork">
        <img src="afbeelding12.jpg" alt="afbeelding12">
        <figcaption>afbeelding12.jpg</figcaption>
    </figure>

 
</main>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const movieTrigger = document.getElementById('afbeelding9');
    
    if(movieTrigger) {
        movieTrigger.addEventListener('click', function(e) {
            e.preventDefault();
            
            const video = document.createElement('video');
            video.src = 'animatiehaak.mp4';
            video.controls = true;
            video.autoplay = true;
            video.style.width = '100%';
            
            // Vervang de afbeelding door de video player
            const parent = movieTrigger.parentNode;
            parent.replaceChild(video, movieTrigger);
        });
    }
});
</script>

</body>
</html>
