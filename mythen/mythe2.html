<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html>
<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta charset="UTF-8">
    <title>werkblad </title>
    <style>
        body { 
            margin: 0; 
            padding: 20px; 
            font-family: 'Helvetica', Arial, sans-serif;
            background: #fcfcfc; 
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px; /* Ruimte tussen de elementen */
            max-width: 1200px;
            margin: 0 auto;
            justify-content: center;
            align-items: start;
        }

        .artwork {
            width: 100%;
            margin: 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .full-width {
            grid-column: span 2; 
        }

        /* Basis styling voor de afbeeldingen en video's */
        .artwork img, .artwork video {
            width: 100%;
            max-width: 550px; 
            height: auto;
            display: block;
            border: 1px solid #ddd;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-radius: 4px;
        }

        .full-width img {
            max-width: 850px; 
        }

        .artwork figcaption {
            margin-top: 8px; 
            font-size: 1.2rem;
            color: #666;
            text-align: center;
            font-weight: 300;
        }

        /* ----- STYLING VOOR DE HOOFDTITEL ----- */
        .main-title {
            font-family: 'Times New Roman', 'Times', 'Times Roman', Georgia, serif; 
            font-style: italic; 
            font-size: 2.2rem; 
            font-weight: normal;
            color: #333;
            margin-top: 10px; 
            margin-bottom: 10px; 
            text-align: center;
            width: 100%;
            letter-spacing: 0.18em; 
            font-variant-ligatures: none; 
        }

        /* Styling voor interactieve elementen */
        #afbeelding7, #afbeelding9 {
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        #afbeelding7:hover, #afbeelding9:hover {
            transform: scale(1.03);
        }

        /* ----- HIER STAAT NU DE COMPLETE PAARSE CLASS ----- */
        /* Deze class regelt nu de kleur én de maten van het vierkant */
        .kleur-paars {
            background-color: #8a2be2; /* De paarse kleur */
            width: 100%;
            max-width: 550px; /* Zelfde breedte als de duo-kolom afbeeldingen */
            aspect-ratio: 1 / 1; /* Zorgt dat het altijd een perfect vierkant is */
            display: block;
            border: 1px solid #ddd;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-radius: 4px;
            box-sizing: border-box;
        }
        /* Specifieke uitzondering: als het paarse vlak paginabreed (full-width) is */
        .full-width .kleur-paars {
            max-width: 850px; 
            
        }
           /* ----- HIER STAAT NU DE COMPLETE RODE CLASS ----- */
        /* Deze class regelt nu de kleur én de maten van het vierkant */
        .kleur-rood {
            background-color: #CC0033; /* De rode kleur */
            width: 100%;
            max-width: 550px; /* Zelfde breedte als de duo-kolom afbeeldingen */
            aspect-ratio: 1 / 1; /* Zorgt dat het altijd een perfect vierkant is */
            display: block;
            border: 1px solid #ddd;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-radius: 4px;
            box-sizing: border-box;
        }
        /* Specifieke uitzondering: als het rode vlak paginabreed (full-width) is */
        .full-width .kleur-rood {
            max-width: 850px; 
            
        }
  /* ----- HIER STAAT NU DE COMPLETE ZWARTE CLASS ----- */
         .kleur-zwart {
            background-color: #333333; /* De zwarte kleur */
            width: 100%;
            max-width: 550px; /* Zelfde breedte als de duo-kolom afbeeldingen */
            aspect-ratio: 1 / 1; /* Zorgt dat het altijd een perfect vierkant is */
            display: block;
            border: 1px solid #ddd;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-radius: 4px;
            box-sizing: border-box;
        }
        /* Specifieke uitzondering: als het zwarte vlak paginabreed (full-width) is */
        .full-width .kleur-zwart {
            max-width: 850px; 
        }
         /* ----- HIER STAAT NU DE COMPLETE BLAUWE CLASS ----- */
         .kleur-blauw {
            background-color:#000099; /* De blauwe kleur */
            width: 100%;
            max-width: 550px; /* Zelfde breedte als de duo-kolom afbeeldingen */
            aspect-ratio: 1 / 1; /* Zorgt dat het altijd een perfect vierkant is */
            display: block;
            border: 1px solid #ddd;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-radius: 4px;
            box-sizing: border-box;
        }
        /* Specifieke uitzondering: als het zwarte vlak paginabreed (full-width) is */
        .full-width .kleur-blauw {
            max-width: 850px; 
        }
    </style>
</head>
