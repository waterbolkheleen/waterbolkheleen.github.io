<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html>
<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta charset="UTF-8">
    <title>werkblad 4</title>
    <style>
        body { 
            margin: 0; 
            padding: 40px; 
            font-family: 'Helvetica', Arial, sans-serif;
            background: #fcfcfc; 
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 60px;
            max-width: 1200px;
            margin: 0 auto;
            justify-content: center;
            align-items: start;
        }

        .artwork {
            width: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .full-width {
            grid-column: span 2;
        }

        .artwork img, .artwork video {
            width: 100%;
            max-width: 550px; /* Mooie harmonieuze breedte voor de duo-kolommen */
            height: auto;
            display: block;
            border: 1px solid #ddd;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-radius: 4px;
        }

        /* Specifieke max-width voor paginabrede afbeeldingen om dominantie te voorkomen */
        .full-width img {
            max-width: 850px; 
        }

        .artwork figcaption {
            margin-top: 15px;
            font-size: 1.2rem;
            color: #666;
            text-align: center;
            font-weight: 300;
        }

        /* Styling voor interactieve afbeeldingen */
        #afbeelding7, #afbeelding9 {
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        #afbeelding7:hover, #afbeelding9:hover {
            transform: scale(1.03);
        }
    </style>
</head>
<body>

<main class="gallery">
    <figure class="artwork full-width">
        <img src="afbeelding1.jpg" alt="picture">
        <figcaption>1</figcaption>
    </figure>

    <figure class="artwork full-width">
        <img src="afbeelding2.jpg" alt="picture">
        <figcaption>2</figcaption>
    </figure>

    <figure class="artwork full-width">
        <img src="afbeelding3.jpg" alt="picture">
        <figcaption>3</figcaption>
    </figure>
    
    <figure class="artwork full-width">
        <img src="afbeelding4.jpg" alt="picture">
        <figcaption>4</figcaption>
    </figure>
    
    <figure class="artwork">
        <img src="afbeelding5.jpg" alt="picture">
        <figcaption>5</figcaption>
    </figure>
      
    <figure class="artwork">
        <img src="afbeelding6.jpg" alt="picture">
        <figcaption>6</figcaption>
    </figure>

    <figure class="artwork">
        <img src="afbeelding7.jpg" alt="picture" id="afbeelding7">
        <figcaption>7.1</figcaption>
    </figure>

    <figure class="artwork">
        <img src="afbeelding8.jpg" alt="picture">
        <figcaption>8</figcaption>
    </figure>
  
    <figure class="artwork">
        <img src="afbeelding9.jpg" alt="picture" id="afbeelding9">
        <figcaption>9</figcaption>
    </figure>

    <figure class="artwork">
        <img src="afbeelding7.jpg" alt="picture">
        <figcaption>10</figcaption>
    </figure>

    <figure class="artwork full-width">
        <img src="afbeelding11.jpg" alt="picture">
        <figcaption>11</figcaption>
    </figure>

    <figure class="artwork full-width">
        <img src="afbeelding10.jpg" alt="picture">
        <figcaption>12 de vergeten mythen van de elementen</figcaption>
    </figure>
</main>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const movieTrigger = document.getElementById('afbeelding9');
    
    if(movieTrigger) {
        movieTrigger.addEventListener('click', function(e) {
            e.preventDefault();
            
            const video = document.createElement('video');
            video.src = 'animatiehaak.mp4';
            video.controls = true;
            video.autoplay = true;
            video.style.width = '100%';
            video.style.maxWidth = '550px'; // Zorgt dat de video even groot blijft als de afbeelding
            
            // Vervang de afbeelding door de video player
            const parent = movieTrigger.parentNode;
            parent.replaceChild(video, movieTrigger);
        });
    }
});
</script>

</body>
</html>
