    <style>
        body { 
            margin: 0
            ; 
            padding: 40px; 
            font-family: 'helvetica';
            background: #fcfcfc; 
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 60px;
            max-width: 1500px;
            margin: 0 auto;
        }

        .artwork {
            width: 100%;
            margin: 0;
        }

        .full-width {
            grid-column: span 2;
        }

        .artwork img {
            width: 100%;
            display: block;
            border: 1px solid #ddd;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .artwork figcaption {
            margin-top: 15px;
            font-size: 2rem;
            color: #666;
            text-align: center;
        }
        }

        /* Styling voor interactieve afbeeldingen */
        #afbeelding7, #afbeelding9 {
            cursor: pointer;
            transition: transform 0.2s;
        }

        #afbeelding7:hover, #afbeelding9:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const movieTrigger = document.getElementById('afbeelding9');
    
    if(movieTrigger) {
        movieTrigger.addEventListener('click', function(e) {
            e.preventDefault();
            
            const video = document.createElement('video');
            video.src = 'animatiehaak.mp4';
            video.controls = true;
            video.autoplay = true;
            video.style.width = '100%';
            
            // Vervang de afbeelding door de video player
            const parent = movieTrigger.parentNode;
            parent.replaceChild(video, movieTrigger);
        });
    }
});
</script>
